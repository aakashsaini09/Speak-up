services:
  backend:
    build: ./backend

    ports:
      - "3001:3001"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules
  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env

    volumes:
      - ./frontend:/app
        # keep container's node_modules
      - /app/node_modules

    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      - backend